<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halaman Login</title>

<style>
    body {
        background-color: #f2f2f2;
        font-family: Arial, sans-serif;
    }

    .login-box {
        width: 400px;
        margin: 100px auto;
    }

    .panel {
        text-align: center;
        background: white;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-shadow: 0 2px 5px #928b8b;
    }

    .panel-heading {
        padding: 15px;
        background: #f7f7f7;
        border-bottom: 1px solid #ddd;
        font-weight: bold;
    }

    .panel-body {
        padding: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    input[type="number"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    .checkbox {
        display: flex;
        justify-content: space-between;
        align-items: right;
        font-size: 14px;
        margin-bottom: 15px;
    }

    .checkbox a {
        text-decoration: none;
        color: #ff0000;
    }

    .checkbox a:hover {
        text-decoration: underline;
    }

    .btn {
        width: 100%;
        padding: 10px;
        background: #277fe4;
        border: none;
        color: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }

    .btn:hover {
        background: #0741ad;
    }

    .register {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .register a {
        text-decoration: none;
        color: #ff0000;
    }

    .register a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="login-box">
    <div class="panel">
        <div class="panel-heading">
            Halaman Daftar
        </div>

        <div class="panel-body">
            <form method="post">

                <div class="form-group">
                    <input type="text" name="username" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <input type="text" name="password" placeholder="Password" required>
                </div>

                <div class="form-group">
                    <input type="password" name="email" placeholder="Email" required>
                </div>
                
                <div class="form-group">
                    <input type="number" name="no_hp" placeholder="No HP (contoh: 08123456789)" required>
                </div>

                <button type="submit" name="login" class="btn">
                    Daftar
                </button>

                <div class="register">
                    Sudah Punya Akun? <a href="tgslgn.html">Login Disini</a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
